# ============================================================
# Async Task Processing Engine — Application Configuration
# ============================================================

spring.application.name=async-task-processing

# Server
server.port=8080

# Actuator — expose health and info endpoints for operational checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging — structured output makes it easier to grep task IDs in production
logging.level.com.poc.taskengine=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [taskId=%X{taskId}] [taskType=%X{taskType}] %msg%n

# ── Phase 5: Task timeout enforcement ─────────────────────────────────────────
# How many seconds a task may stay IN_PROGRESS before the watchdog evicts it.
# In production this should be well above the 99th-percentile task duration.
# Set low in integration tests to observe TIMED_OUT transitions quickly.
task.timeout.seconds=60

# How often the watchdog scans for timed-out tasks (in milliseconds).
# Worst-case eviction latency = interval + (task duration past timeout).
task.watchdog.interval-ms=30000

# ── Phase 5: Retry with exponential backoff ────────────────────────────────────
# Base delay (ms) before the first retry. Each subsequent retry doubles this:
#   attempt 1: base * 2^0 = 1000ms
#   attempt 2: base * 2^1 = 2000ms
#   attempt 3: base * 2^2 = 4000ms
task.retry.base-delay-ms=1000

# Maximum random jitter added per retry delay (ms).
# Prevents a "retry storm" when many tasks fail simultaneously.
task.retry.max-jitter-ms=100

# Max seconds to wait for a Semaphore permit when re-enqueuing a retry.
# Retry scheduler threads (not HTTP threads) can afford to block briefly.
task.retry.permit-timeout-seconds=5

# ── Phase 8: PostgreSQL Integration ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/task_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Schema validation — schema is managed manually via sql scripts.
# Letting Hibernate auto-generate or alter the schema is dangerous in production.
# Validation verifies that manually created tables match Java entities on startup.
spring.jpa.hibernate.ddl-auto=validate

# Explicit HikariCP configuration.
# The DB connection pool is a bounded resource exactly like the thread pools from Phase 2.
# Sizing it too large can let this app instance exhaust PostgreSQL's max_connections
# and take the database down for every other client. Sizing to 10 limits total connection footprint.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000


